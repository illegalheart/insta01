name: Publish Instagram Post

on:
  push:
    branches:
      - main
    paths:
      - "posts/*.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find newly added posts
        id: posts
        shell: bash
        run: |
          FILES=$(git diff --diff-filter=A --name-only HEAD^ HEAD -- 'posts/*.json')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish new posts
        if: steps.posts.outputs.files != ''
        shell: bash
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          META_API_VERSION: ${{ vars.META_API_VERSION }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            node scripts/publish-instagram.mjs "$file"
            node -e "const fs=require('fs'); const file=process.argv[1]; const post=JSON.parse(fs.readFileSync(file,'utf8')); const imagePaths=post.image_paths ?? (post.image_path ? [post.image_path] : []); for (const imagePath of imagePaths) fs.rmSync(imagePath,{force:true}); fs.rmSync(file,{force:true});" "$file"
          done <<< "${{ steps.posts.outputs.files }}"

      - name: Remove published post files
        if: steps.posts.outputs.files != ''
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A posts img
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove published Instagram post files"
          git push
